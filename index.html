<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>GLSL Projectron creator demo</title>
    <meta name="description" content="viewer">
    <style type="text/css">
        :root {
            --bg: #0b1220;
            --panel: #121b2d;
            --panel-muted: #0f1626;
            --text: #e7ecf5;
            --muted: #9cb0c9;
            --accent: #7dd3fc;
            --accent-strong: #38bdf8;
            --border: #1f2c44;
            --shadow: 0 10px 35px rgba(5, 10, 25, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.15), transparent 25%),
                radial-gradient(circle at 90% 10%, rgba(125, 211, 252, 0.08), transparent 30%),
                var(--bg);
            color: var(--text);
            font: 400 15px 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        a {
            color: var(--accent);
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .headline {
            line-height: 1.5;
        }

        h1 {
            margin: 0 0 0.25rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(125, 211, 252, 0.16);
            color: var(--accent);
            padding: 0.4rem 0.75rem;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 1rem;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            box-shadow: var(--shadow);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .panel-subtitle {
            color: var(--muted);
            font-size: 13px;
        }

        .canvas-frame {
            background: var(--panel-muted);
            border-radius: 10px;
            padding: 0.75rem;
            border: 1px solid var(--border);
        }

        canvas#view {
            width: 100%;
            max-width: 560px;
            display: block;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #000;
        }

        .controls {
            display: grid;
            gap: 0.85rem;
        }

        .control-card {
            background: var(--panel-muted);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 0.9rem;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.6rem 0.75rem;
        }

        label {
            user-select: none;
            display: block;
            color: var(--muted);
            font-size: 14px;
        }

        label strong {
            color: var(--text);
            font-weight: 600;
        }

        .inline {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        select,
        input,
        button,
        textarea {
            font: inherit;
            color: var(--text);
        }

        select,
        input[type='text'],
        input[type='number'],
        textarea {
            width: 100%;
            padding: 0.45rem 0.55rem;
            background: #0b1322;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }

        input[type='checkbox'] {
            accent-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        button {
            appearance: none;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.18), rgba(56, 189, 248, 0.14));
            color: var(--text);
            padding: 0.55rem 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
            box-shadow: 0 6px 16px rgba(56, 189, 248, 0.18);
        }

        .muted-text {
            color: var(--muted);
            margin: 0.1rem 0 0;
            font-size: 13px;
        }

        .stat-boxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.55rem;
            margin-top: 0.35rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.6rem;
        }

        .stat label {
            font-size: 12px;
            letter-spacing: 0.02em;
            margin-bottom: 0.2rem;
        }

        .stat input {
            font-family: 'SFMono-Regular', 'Menlo', 'Consolas', monospace;
            text-align: center;
        }

        .links {
            margin-top: 1.25rem;
            color: var(--muted);
            line-height: 1.6;
        }

        @media (max-width: 960px) {
            header {
                flex-direction: column;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            canvas#view {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <div class="headline">
                <div class="pill">Create a new projection</div>
                <h1>GLSL Projectron</h1>
                <p class="panel-subtitle">
                    Evolve a 3D polygon cloud until it matches your target image. Tune the knobs, watch it
                    iterate, and export the resulting geometry.
                </p>
            </div>
            <div class="button-row">
                <!-- 保留給既有 JS 使用的隱藏 checkbox -->
                <input type="checkbox" id="paused" checked style="display: none;" />

                <!-- 新的樣式按鈕，風格跟右邊一樣 -->
                <button id="pauseBtn" type="button">Paused</button>

                <button id="uploadTrigger" type="button">選擇目標圖片</button>
                <input id="imageInput" type="file" accept="image/*" hidden />
            </div>
        </header>


        <div class="layout">
            <div class="panel">
                <div class="panel-header">
                    <span>Viewport</span>
                    <span class="panel-subtitle">拖曳旋轉視角</span>
                </div>
                <div class="canvas-frame">
                    <canvas id='view' width="500" height="500"></canvas>
                </div>
            </div>

            <div class="controls">
                <div class="control-card">
                    <div class="panel-header">
                        <span>Progress</span>
                        <span class="panel-subtitle">自動更新</span>
                    </div>
                    <div class="stat-boxes">
                        <div class="stat">
                            <label>Polygons</label>
                            <input id='polys' type='text' readonly>
                        </div>
                        <div class="stat">
                            <label>Generations</label>
                            <input id='gens' type='text' readonly>
                        </div>
                        <div class="stat">
                            <label>Gens / s</label>
                            <input id='gps' type='text' readonly>
                        </div>
                        <div class="stat">
                            <label>Score</label>
                            <input id='score' type='text' readonly>
                        </div>
                    </div>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>Generation settings</span>
                        <span class="panel-subtitle">微調演算法行為</span>
                    </div>
                    <div class="control-grid">
                        <label>Generations per frame
                            <select id='gensPerFrame'>
                                <option>1</option>
                                <option>10</option>
                                <option selected='true'>20</option>
                                <option>50</option>
                                <option>100</option>
                            </select>
                        </label>
                        <label>Fewer polys tolerance
                            <input type='text' id='preferFewer' value='0.001'>
                            <div class="muted-text">Score tolerance within which to drop polygons</div>
                        </label>
                        <label>Alpha range
                            <div class="inline" style="width: 100%;">
                                <input style="max-width: 80px;" type='text' id='minAlpha' value='0.1'>
                                <span class="panel-subtitle">to</span>
                                <input style="max-width: 80px;" type='text' id='maxAlpha' value='0.5'>
                            </div>
                        </label>
                        <label>Adjust amount
                            <input type='text' id='adjust' value='0.5'>
                        </label>
                    </div>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>Data</span>
                        <span class="panel-subtitle">匯出或匯入頂點資料</span>
                    </div>
                    <div class="button-row">
                        <button id='export'>Export vert/color data ↓</button>
                        <button id='import'>Import vert/color data ↑</button>
                    </div>
                    <textarea id='data' rows='3' cols='30'></textarea>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>Display</span>
                        <span class="panel-subtitle">檢視參考層</span>
                    </div>
                    <div class="button-row">
                        <label class="inline">
                            <input type='checkbox' id='showRef' />Show reference
                        </label>
                        <label class="inline">
                            <input type='checkbox' id='showScr' />Scratch buffer
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

    <!-- Inline copies of src/shaders/*.glsl so the page works without bundling -->
    <script id="shader-camera-vert" type="x-shader/x-vertex">
precision mediump float;

attribute vec4 position;
attribute vec4 vertColor;

uniform float perspective;
uniform mat4 camera;

varying vec4 fragColor;

void main() {

        // transform xyz inputs from [0..1] to clipspace [-1..1]
        vec4 pos = 2.0 * position - 1.0;

        // squash z and move back a bit so overall shape is visible
        // when rotated
        pos.z = pos.z * 0.75 + 0.25;

        // rotate by camera transform
        pos = camera * pos;

        // apply perspective
        float w = 1.0 + perspective*( pos.z );

        // squash z more to lessen getting clipped by frustum
        pos.z = pos.z * 0.5;

        // outputs
        gl_Position = vec4(pos.xyz, w);
        fragColor = vertColor;
}
    </script>
    <script id="shader-camera-frag" type="x-shader/x-fragment">
precision mediump float;

varying vec4 fragColor;

void main() {
        gl_FragColor = fragColor;
//      gl_FragColor = vec4( fragColor, 1.0);
}
    </script>
    <script id="shader-flatTexture-vert" type="x-shader/x-vertex">
precision mediump float;

attribute vec2 position;
uniform float multY;

varying vec2 uv;

void main() {
        gl_Position = vec4(position,0.0,1.0);

//      flip y for texture loookup
        uv = position * vec2( 1.0, multY );
        uv = 0.5 * (uv+1.0);

}
    </script>
    <script id="shader-flatTexture-frag" type="x-shader/x-fragment">
precision mediump float;

uniform sampler2D buffer;
varying vec2 uv;

void main() {

        gl_FragColor = texture2D(buffer, uv);

}
    </script>
    <script id="shader-diffReduce4-frag" type="x-shader/x-fragment">
precision highp float;

uniform float inputDim;
uniform sampler2D bufferA;
uniform sampler2D bufferB;

const float mag = 255.0; // magnitude for packing float into rgb channels

varying vec2 uv;

void main() {

        // size of an input and output pixel in uv
        float ip = 1.0 / inputDim;
        float op = ip * 4.0;

        // lower left corner of square of pixels to be reduced
        vec2 p = vec2(floor(uv.x/op)*op, floor(uv.y/op)*op );

        // find the distance betweens A and B pixels
        // and average it over a 4x4 square
        float sum = 0.0;
        vec2 offset = vec2(0.0);

        vec3 diff;

        // 'score' of similarity between image pixels A,B is basically:
        //              average( dot( (A-B), (A-B) ) )

        for (int i=0; i<4; ++i) {
                for (int j=0; j<4; ++j) {

                        diff = texture2D(bufferA, p+offset).rgb -
                                texture2D(bufferB, p+offset).rgb;

                        sum += dot(diff,diff);

                        offset.y += ip;
                }
                offset.x += ip;
                offset.y = 0.0;
        }
        float avg = sum/16.0;

        // prevent clipping - scale avg to [0..1]
        avg /= 3.0;

        // divide magnitude into channels
        float r = floor( avg*mag ) / mag;
        float g = floor((avg-r)*mag*mag) / mag;
        float b = ((avg-r)*mag - g) * mag;

        gl_FragColor = vec4( r, g, b, 1.0 );

}
    </script>
    <script id="shader-avgReduce4-frag" type="x-shader/x-fragment">
precision highp float;

uniform float inputDim;
uniform sampler2D buffer;

const float mag = 255.0; // magnitude for packing float into rgb channels

varying vec2 uv;

void main() {

        // size of an input and output pixel in uv
        float ip = 1.0 / inputDim;
        float op = ip * 4.0;

        // lower left corner of square of pixels to be reduced
        vec2 p = vec2(floor(uv.x/op)*op, floor(uv.y/op)*op );

        // average values in rg over a 4x4 square.
        // r channel is 256 times more significant than g.
        float sum = 0.0;
        vec2 offset = vec2(0.0);
        vec4 col;

        for (int i=0; i<4; ++i) {
                for (int j=0; j<4; ++j) {
                        col = texture2D(buffer, p+offset);
                        sum += col.r + (col.g + col.b/mag)/mag;
                        offset.y += ip;
                }
                offset.x += ip;
                offset.y = 0.0;
        }
        float avg = sum/16.0;

        // divide magnitude into channels
        float r = floor( avg*mag ) / mag;
        float g = floor((avg-r)*mag*mag) / mag;
        float b = ((avg-r)*mag - g) * mag;

        gl_FragColor = vec4( r, g, b, 1.0 );

}
    </script>

    <script>
        let viewCanvas = document.getElementById('view');
        const canvasContainer = document.querySelector('.canvas-frame');
        let triCloud = [];
        let paused = true;
        let gens = 0;
        let lastGpsUpdate = 0;
        let gensPerSecond = 0;
        let targetImg = null;
        let gl;
        let cameraProgram;
        let posLocation;
        let colorLocation;
        let posBuffer;
        let colorBuffer;
        let perspectiveLocation;
        let cameraLocation;

        const stats = {
            polys: document.getElementById('polys'),
            gens: document.getElementById('gens'),
            gps: document.getElementById('gps'),
            score: document.getElementById('score')
        };

        function updateStats(scoreVal = 0) {
            stats.polys.value = triCloud.length.toString();
            stats.gens.value = gens.toString();
            stats.gps.value = gensPerSecond.toFixed(1);
            stats.score.value = scoreVal.toFixed(3);
        }

        function syncPauseButton() {
            const checkbox = document.getElementById('paused');
            paused = checkbox.checked;
            document.getElementById('pauseBtn').textContent = paused ? '暫停中' : '運行中';
        }

        function randomVec(mag = 1) {
            return (Math.random() * 2 - 1) * mag;
        }

        function randomColor() {
            return [Math.random(), Math.random(), Math.random(), 0.35 + Math.random() * 0.4];
        }

        function randomTri() {
            return [
                { pos: { x: randomVec(), y: randomVec(), z: randomVec() }, color: randomColor() },
                { pos: { x: randomVec(), y: randomVec(), z: randomVec() }, color: randomColor() },
                { pos: { x: randomVec(), y: randomVec(), z: randomVec() }, color: randomColor() }
            ];
        }

        function seedTris(count = 60) {
            triCloud = [];
            for (let i = 0; i < count; i++) {
                triCloud.push(randomTri());
            }
        }

        function mutateTri(tri, adjust = 0.5) {
            const idx = Math.floor(Math.random() * 3);
            const target = tri[idx].pos;
            target.x = Math.max(-1, Math.min(1, target.x + randomVec(adjust * 0.05)));
            target.y = Math.max(-1, Math.min(1, target.y + randomVec(adjust * 0.05)));
            target.z = Math.max(-1, Math.min(1, target.z + randomVec(adjust * 0.05)));
        }

        function jitterCloud(adjust) {
            if (triCloud.length === 0) seedTris();
            for (let i = 0; i < triCloud.length; i++) {
                mutateTri(triCloud[i], adjust);
            }
        }

        function exportData() {
            const exportable = triCloud.map(tri => tri.map(v => ({
                x: v.pos.x,
                y: v.pos.y,
                z: v.pos.z,
                color: v.color
            })));
            const data = JSON.stringify(exportable, null, 2);
            document.getElementById('data').value = data;
        }

        function importData() {
            try {
                const parsed = JSON.parse(document.getElementById('data').value);
                if (Array.isArray(parsed)) {
                    triCloud = parsed.map(tri => tri.map(v => ({
                        pos: { x: v.x, y: v.y, z: v.z },
                        color: Array.isArray(v.color) ? v.color : randomColor()
                    })));
                    updateStats();
                }
            } catch (e) {
                console.warn('Unable to parse triangle data', e);
            }
        }

        function loadImageFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                loadImage(ev.target.result, (img) => {
                    targetImg = img;
                });
            };
            reader.readAsDataURL(file);
        }

        function compileShader(glCtx, id, type) {
            const src = document.getElementById(id).textContent;
            const shader = glCtx.createShader(type);
            glCtx.shaderSource(shader, src);
            glCtx.compileShader(shader);
            if (!glCtx.getShaderParameter(shader, glCtx.COMPILE_STATUS)) {
                console.error('Shader compile error', glCtx.getShaderInfoLog(shader));
                glCtx.deleteShader(shader);
                return null;
            }
            return shader;
        }

        function createProgram() {
            const vert = compileShader(gl, 'shader-camera-vert', gl.VERTEX_SHADER);
            const frag = compileShader(gl, 'shader-camera-frag', gl.FRAGMENT_SHADER);
            if (!vert || !frag) return null;
            const program = gl.createProgram();
            gl.attachShader(program, vert);
            gl.attachShader(program, frag);
            gl.linkProgram(program);
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                console.error('Program link error', gl.getProgramInfoLog(program));
                gl.deleteProgram(program);
                return null;
            }
            return program;
        }

        function updateBuffers(alphaRange, adjust) {
            const vertexCount = triCloud.length * 3;
            const positions = new Float32Array(vertexCount * 4);
            const colors = new Float32Array(vertexCount * 4);
            let pi = 0;
            let ci = 0;
            const shift = [0.3, 0.7, 1.0];
            triCloud.forEach(tri => {
                tri.forEach(({ pos, color }) => {
                    positions[pi++] = pos.x;
                    positions[pi++] = pos.y;
                    positions[pi++] = pos.z;
                    positions[pi++] = 1.0;

                    const base = [Math.abs(pos.x), Math.abs(pos.y), Math.abs(pos.z)];
                    colors[ci++] = base[0] * (1 - adjust) + shift[0] * adjust;
                    colors[ci++] = base[1] * (1 - adjust) + shift[1] * adjust;
                    colors[ci++] = base[2] * (1 - adjust) + shift[2] * adjust;
                    const alpha = Math.min(alphaRange[1], Math.max(alphaRange[0], (Math.abs(pos.x) + Math.abs(pos.y)) * 0.25));
                    colors[ci++] = alpha * color[3];
                });
            });

            gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, positions, gl.DYNAMIC_DRAW);
            gl.enableVertexAttribArray(posLocation);
            gl.vertexAttribPointer(posLocation, 4, gl.FLOAT, false, 0, 0);

            gl.bindBuffer(gl.ARRAY_BUFFER, colorBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, colors, gl.DYNAMIC_DRAW);
            gl.enableVertexAttribArray(colorLocation);
            gl.vertexAttribPointer(colorLocation, 4, gl.FLOAT, false, 0, 0);

            return vertexCount;
        }

        function makeCameraMatrix(theta) {
            const c = Math.cos(theta);
            const s = Math.sin(theta);
            return new Float32Array([
                c, 0, s, 0,
                0, 1, 0, 0,
                -s, 0, c, 0,
                0, 0, 0, 1
            ]);
        }

        document.getElementById('pauseBtn').addEventListener('click', () => {
            const checkbox = document.getElementById('paused');
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event('change', { bubbles: true }));
        });

        document.getElementById('paused').addEventListener('change', syncPauseButton);
        document.getElementById('export').addEventListener('click', exportData);
        document.getElementById('import').addEventListener('click', importData);
        document.getElementById('uploadTrigger').addEventListener('click', () => document.getElementById('imageInput').click());
        document.getElementById('imageInput').addEventListener('change', (ev) => loadImageFile(ev.target.files[0]));

        // Initialize data early so it is ready for p5
        seedTris();
        syncPauseButton();

        let lastGenTimestamp = performance.now();
        let scratchLayer;

        const sketch = (p) => {
            p.setup = () => {
                if (viewCanvas && viewCanvas.parentNode) {
                    viewCanvas.parentNode.removeChild(viewCanvas);
                }
                const cnv = p.createCanvas(500, 500, p.WEBGL);
                cnv.canvas.id = 'view';
                if (canvasContainer) cnv.parent(canvasContainer);
                viewCanvas = cnv.canvas;

                gl = p._renderer.GL;
                gl.disable(gl.DEPTH_TEST);
                gl.enable(gl.BLEND);
                gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

                cameraProgram = createProgram();
                posLocation = gl.getAttribLocation(cameraProgram, 'position');
                colorLocation = gl.getAttribLocation(cameraProgram, 'vertColor');
                perspectiveLocation = gl.getUniformLocation(cameraProgram, 'perspective');
                cameraLocation = gl.getUniformLocation(cameraProgram, 'camera');

                posBuffer = gl.createBuffer();
                colorBuffer = gl.createBuffer();

                p.noStroke();
                scratchLayer = p.createGraphics(500, 500, p.WEBGL);
            };

            p.windowResized = () => {
                p.resizeCanvas((viewCanvas && viewCanvas.clientWidth) || 500, 500);
            };

            p.draw = () => {
                const now = performance.now();
                const dt = (now - lastGenTimestamp) / 1000;
                if (dt > 0.5) {
                    gensPerSecond = (gens - lastGpsUpdate) / dt;
                    lastGenTimestamp = now;
                    lastGpsUpdate = gens;
                }

                const adjust = parseFloat(document.getElementById('adjust').value) || 0.5;
                const gensPerFrame = parseInt(document.getElementById('gensPerFrame').value, 10) || 1;
                const alphaMin = parseFloat(document.getElementById('minAlpha').value) || 0.1;
                const alphaMax = parseFloat(document.getElementById('maxAlpha').value) || 0.5;
                const tolerance = parseFloat(document.getElementById('preferFewer').value) || 0.001;

                if (!paused) {
                    for (let i = 0; i < gensPerFrame; i++) {
                        jitterCloud(adjust);
                        gens += 1;
                    }
                }

                // Simple score uses spread of vertices in XY to give user feedback
                const spread = triCloud.reduce((acc, tri) => {
                    const mag = tri.reduce((m, v) => m + Math.abs(v.pos.x) + Math.abs(v.pos.y), 0);
                    return acc + mag;
                }, 0) / Math.max(triCloud.length, 1);
                const score = Math.max(0, 1.5 - (spread * 0.15 + tolerance));

                p.background(8, 12, 24);

                if (cameraProgram) {
                    gl.useProgram(cameraProgram);
                    const vertCount = updateBuffers([alphaMin, alphaMax], adjust);
                    const cameraMatrix = makeCameraMatrix(p.frameCount * 0.002);
                    gl.uniform1f(perspectiveLocation, 0.2);
                    gl.uniformMatrix4fv(cameraLocation, false, cameraMatrix);
                    gl.viewport(0, 0, p.width, p.height);
                    gl.clear(gl.COLOR_BUFFER_BIT);
                    gl.drawArrays(gl.TRIANGLES, 0, vertCount);
                }

                if (document.getElementById('showRef').checked && targetImg) {
                    p.push();
                    p.resetMatrix();
                    p.translate(-p.width / 2, -p.height / 2, 0);
                    p.image(targetImg, 0, 0, p.width, p.height);
                    p.pop();
                }

                if (document.getElementById('showScr').checked) {
                    scratchLayer.push();
                    scratchLayer.clear();
                    scratchLayer.noStroke();
                    scratchLayer.fill(120, 170, 255, 50);
                    scratchLayer.rect(-scratchLayer.width / 2, -scratchLayer.height / 2, scratchLayer.width, scratchLayer.height);
                    scratchLayer.pop();
                    p.resetMatrix();
                    p.image(scratchLayer, -p.width / 2, -p.height / 2, p.width, p.height);
                }

                updateStats(score);
            };
        };

        new p5(sketch, document.body);
    </script>
</body>
