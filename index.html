<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>GLSL Projectron creator demo</title>
    <meta name="description" content="viewer">
    <style type="text/css">
        :root {
            --bg: #0b1220;
            --panel: #121b2d;
            --panel-muted: #0f1626;
            --text: #e7ecf5;
            --muted: #9cb0c9;
            --accent: #7dd3fc;
            --accent-strong: #38bdf8;
            --border: #1f2c44;
            --shadow: 0 10px 35px rgba(5, 10, 25, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.15), transparent 25%),
                radial-gradient(circle at 90% 10%, rgba(125, 211, 252, 0.08), transparent 30%),
                var(--bg);
            color: var(--text);
            font: 400 15px 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        a {
            color: var(--accent);
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .headline {
            line-height: 1.5;
        }

        h1 {
            margin: 0 0 0.25rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(125, 211, 252, 0.16);
            color: var(--accent);
            padding: 0.4rem 0.75rem;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 1rem;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            box-shadow: var(--shadow);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .panel-subtitle {
            color: var(--muted);
            font-size: 13px;
        }

        .canvas-frame {
            background: var(--panel-muted);
            border-radius: 10px;
            padding: 0.75rem;
            border: 1px solid var(--border);
        }

        canvas#view {
            width: 100%;
            max-width: 560px;
            display: block;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #000;
        }

        .controls {
            display: grid;
            gap: 0.85rem;
        }

        .control-card {
            background: var(--panel-muted);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 0.9rem;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.6rem 0.75rem;
        }

        label {
            user-select: none;
            display: block;
            color: var(--muted);
            font-size: 14px;
        }

        label strong {
            color: var(--text);
            font-weight: 600;
        }

        .inline {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        select,
        input,
        button,
        textarea {
            font: inherit;
            color: var(--text);
        }

        select,
        input[type='text'],
        input[type='number'],
        textarea {
            width: 100%;
            padding: 0.45rem 0.55rem;
            background: #0b1322;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }

        input[type='checkbox'] {
            accent-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        button {
            appearance: none;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.18), rgba(56, 189, 248, 0.14));
            color: var(--text);
            padding: 0.55rem 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
            box-shadow: 0 6px 16px rgba(56, 189, 248, 0.18);
        }

        .muted-text {
            color: var(--muted);
            margin: 0.1rem 0 0;
            font-size: 13px;
        }

        .stat-boxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.55rem;
            margin-top: 0.35rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.6rem;
        }

        .stat label {
            font-size: 12px;
            letter-spacing: 0.02em;
            margin-bottom: 0.2rem;
        }

        .stat input {
            font-family: 'SFMono-Regular', 'Menlo', 'Consolas', monospace;
            text-align: center;
        }

        .links {
            margin-top: 1.25rem;
            color: var(--muted);
            line-height: 1.6;
        }

        @media (max-width: 960px) {
            header {
                flex-direction: column;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            canvas#view {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <div class="headline">
                <div class="pill">Create a new projection</div>
                <h1>GLSL Projectron</h1>
                <p class="panel-subtitle">
                    Evolve a 3D polygon cloud until it matches your target image. Tune the knobs, watch it
                    iterate, and export the resulting geometry.
                </p>
            </div>
            <div class="button-row">
                <!-- 保留給既有 JS 使用的隱藏 checkbox -->
                <input type="checkbox" id="paused" checked style="display: none;" />

                <!-- 新的樣式按鈕，風格跟右邊一樣 -->
                <button id="pauseBtn" type="button">Paused</button>

                <button id="uploadTrigger" type="button">選擇目標圖片</button>
                <input id="imageInput" type="file" accept="image/*" hidden />
            </div>
        </header>


        <div class="layout">
            <div class="panel">
                <div class="panel-header">
                    <span>Viewport</span>
                    <span class="panel-subtitle">拖曳旋轉視角</span>
                </div>
                <div class="canvas-frame">
                    <canvas id='view' width="500" height="500"></canvas>
                </div>
            </div>

            <div class="controls">
                <div class="control-card">
                    <div class="panel-header">
                        <span>Progress</span>
                        <span class="panel-subtitle">自動更新</span>
                    </div>
                    <div class="stat-boxes">
                        <div class="stat">
                            <label>Polygons</label>
                            <input id='polys' type='text' readonly>
                        </div>
                        <div class="stat">
                            <label>Generations</label>
                            <input id='gens' type='text' readonly>
                        </div>
                        <div class="stat">
                            <label>Gens / s</label>
                            <input id='gps' type='text' readonly>
                        </div>
                        <div class="stat">
                            <label>Score</label>
                            <input id='score' type='text' readonly>
                        </div>
                    </div>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>Generation settings</span>
                        <span class="panel-subtitle">微調演算法行為</span>
                    </div>
                    <div class="control-grid">
                        <label>Generations per frame
                            <select id='gensPerFrame'>
                                <option>1</option>
                                <option>10</option>
                                <option selected='true'>20</option>
                                <option>50</option>
                                <option>100</option>
                            </select>
                        </label>
                        <label>Fewer polys tolerance
                            <input type='text' id='preferFewer' value='0.001'>
                            <div class="muted-text">Score tolerance within which to drop polygons</div>
                        </label>
                        <label>Alpha range
                            <div class="inline" style="width: 100%;">
                                <input style="max-width: 80px;" type='text' id='minAlpha' value='0.1'>
                                <span class="panel-subtitle">to</span>
                                <input style="max-width: 80px;" type='text' id='maxAlpha' value='0.5'>
                            </div>
                        </label>
                        <label>Adjust amount
                            <input type='text' id='adjust' value='0.5'>
                        </label>
                    </div>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>Data</span>
                        <span class="panel-subtitle">匯出或匯入頂點資料</span>
                    </div>
                    <div class="button-row">
                        <button id='export'>Export vert/color data ↓</button>
                        <button id='import'>Import vert/color data ↑</button>
                    </div>
                    <textarea id='data' rows='3' cols='30'></textarea>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>Display</span>
                        <span class="panel-subtitle">檢視參考層</span>
                    </div>
                    <div class="button-row">
                        <label class="inline">
                            <input type='checkbox' id='showRef' />Show reference
                        </label>
                        <label class="inline">
                            <input type='checkbox' id='showScr' />Scratch buffer
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="./index.js"></script>
</body>

</html>
