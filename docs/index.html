<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="utf-8">
    <title>GLSL Projectron 建構示範</title>
    <meta name="description" content="viewer">
    <style type="text/css">
        :root {
            --bg: #0b1220;
            --panel: #121b2d;
            --panel-muted: #0f1626;
            --text: #e7ecf5;
            --muted: #9cb0c9;
            --accent: #7dd3fc;
            --accent-strong: #38bdf8;
            --border: #1f2c44;
            --shadow: 0 10px 35px rgba(5, 10, 25, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.15), transparent 25%),
                radial-gradient(circle at 90% 10%, rgba(125, 211, 252, 0.08), transparent 30%),
                var(--bg);
            color: var(--text);
            font: 400 15px 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        a {
            color: var(--accent);
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .headline {
            line-height: 1.5;
        }

        h1 {
            margin: 0 0 0.25rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(125, 211, 252, 0.16);
            color: var(--accent);
            padding: 0.4rem 0.75rem;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 1rem;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            box-shadow: var(--shadow);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .panel-subtitle {
            color: var(--muted);
            font-size: 13px;
        }

        .canvas-frame {
            background: var(--panel-muted);
            border-radius: 10px;
            padding: 0.75rem;
            border: 1px solid var(--border);
        }

        canvas#view {
            width: 100%;
            max-width: 560px;
            display: block;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #000;
        }

        .controls {
            display: grid;
            gap: 0.85rem;
        }

        .control-card {
            background: var(--panel-muted);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 0.9rem;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.6rem 0.75rem;
        }

        label {
            user-select: none;
            display: block;
            color: var(--muted);
            font-size: 14px;
        }

        .inline {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        select,
        input,
        button,
        textarea {
            font: inherit;
            color: var(--text);
        }

        select,
        input[type='text'],
        input[type='number'],
        textarea {
            width: 100%;
            padding: 0.45rem 0.55rem;
            background: #0b1322;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }

        input[type='checkbox'] {
            accent-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        button {
            appearance: none;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.18), rgba(56, 189, 248, 0.14));
            color: var(--text);
            padding: 0.55rem 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
            box-shadow: 0 6px 16px rgba(56, 189, 248, 0.18);
        }

        .muted-text {
            color: var(--muted);
            margin: 0.1rem 0 0;
            font-size: 13px;
        }

        .stat-boxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.55rem;
            margin-top: 0.35rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.6rem;
        }

        .stat label {
            font-size: 12px;
            letter-spacing: 0.02em;
            margin-bottom: 0.2rem;
        }

        .stat input {
            font-family: 'SFMono-Regular', 'Menlo', 'Consolas', monospace;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <div class="headline">
                <div class="pill">建立新的投影</div>
                <h1>GLSL Projectron</h1>
                <p class="panel-subtitle">
                    透過演化多邊形雲，使其逐步逼近你的目標影像。調整參數、觀察迭代過程，並可匯出最終的幾何資料。
                </p>
            </div>

            <div class="button-row">
                <input type="checkbox" id="paused" checked style="display: none;" />
                <button id="pauseBtn" type="button">暫停</button>
                <button id="uploadTrigger" type="button">選擇目標圖片</button>
                <button id="resetBtn" type="button">清除</button>
                <input id="imageInput" type="file" accept="image/*" hidden />
            </div>
        </header>

        <div class="layout">
            <div class="panel">
                <div class="panel-header">
                    <span>視窗區</span>
                    <span class="panel-subtitle">拖曳以旋轉視角</span>
                </div>
                <div class="canvas-frame">
                    <canvas id='view' width="500" height="500"></canvas>
                </div>
            </div>

            <div class="controls">

                <div class="control-card">
                    <div class="panel-header">
                        <span>進度</span>
                        <span class="panel-subtitle">自動更新</span>
                    </div>

                    <div class="stat-boxes">
                        <div class="stat">
                            <label>多邊形數</label>
                            <input id='polys' type='text' readonly>
                        </div>

                        <div class="stat">
                            <label>世代數</label>
                            <input id='gens' type='text' readonly>
                        </div>

                        <div class="stat">
                            <label>世代 / 秒</label>
                            <input id='gps' type='text' readonly>
                        </div>

                        <div class="stat">
                            <label>分數</label>
                            <input id='score' type='text' readonly>
                        </div>
                    </div>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>演化參數</span>
                        <span class="panel-subtitle">調整演算法行為</span>
                    </div>

                    <div class="control-grid">

                        <label>每幀演化次數
                            <select id='gensPerFrame'>
                                <option>1</option>
                                <option>10</option>
                                <option selected='true'>20</option>
                                <option>50</option>
                                <option>100</option>
                            </select>
                        </label>

                        <label>較少多邊形容忍度
                            <input type='text' id='preferFewer' value='0.001'>
                            <div class="muted-text">分數在此範圍內時允許捨棄多邊形</div>
                        </label>

                        <label>Alpha 範圍
                            <div class="inline" style="width: 100%;">
                                <input style="max-width: 80px;" type='text' id='minAlpha' value='0.1'>
                                <span class="panel-subtitle">到</span>
                                <input style="max-width: 80px;" type='text' id='maxAlpha' value='0.5'>
                            </div>
                        </label>

                        <label>調整幅度
                            <input type='text' id='adjust' value='0.5'>
                        </label>

                    </div>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>資料匯入 / 匯出</span>
                        <span class="panel-subtitle">頂點與顏色資料</span>
                    </div>

                    <div class="button-row">
                        <button id='export'>匯出資料 ↓</button>
                        <button id='import'>匯入資料 ↑</button>
                    </div>

                    <textarea id='data' rows='3' cols='30'></textarea>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>顯示設定</span>
                        <span class="panel-subtitle">顯示參考層或中間結果</span>
                    </div>

                    <div class="button-row">
                        <label class="inline">
                            <input type='checkbox' id='showRef' /> 顯示參考影像
                        </label>

                        <label class="inline">
                            <input type='checkbox' id='showScr' /> 顯示暫存緩衝
                        </label>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="maker-bundle.js"></script>

    <script>
        (function () {
            var checkbox = document.getElementById('paused');
            var btn = document.getElementById('pauseBtn');
            if (!checkbox || !btn) return;

            function syncLabel() {
                btn.textContent = checkbox.checked ? '運行' : '暫停';
            }

            btn.addEventListener('click', function () {
                checkbox.checked = !checkbox.checked;
                var ev = new Event('change', { bubbles: true });
                checkbox.dispatchEvent(ev);
                syncLabel();
            });

            syncLabel();
        })();
    </script>

</body>

</html>
