<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="utf-8">
    <title>GLSL Projectron 建構示範</title>
    <meta name="description" content="viewer">
    <style type="text/css">
        :root {
            --bg: #0b1220;
            --panel: #121b2d;
            --panel-muted: #0f1626;
            --text: #e7ecf5;
            --muted: #9cb0c9;
            --accent: #7dd3fc;
            --accent-strong: #38bdf8;
            --border: #1f2c44;
            --shadow: 0 10px 35px rgba(5, 10, 25, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.15), transparent 25%),
                radial-gradient(circle at 90% 10%, rgba(125, 211, 252, 0.08), transparent 30%),
                var(--bg);
            color: var(--text);
            font: 400 15px 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        a {
            color: var(--accent);
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .headline {
            line-height: 1.5;
        }

        h1 {
            margin: 0 0 0.25rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(125, 211, 252, 0.16);
            color: var(--accent);
            padding: 0.4rem 0.75rem;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 1rem;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            box-shadow: var(--shadow);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .panel-subtitle {
            color: var(--muted);
            font-size: 13px;
        }

        .canvas-frame {
            background: var(--panel-muted);
            border-radius: 10px;
            padding: 0.75rem;
            border: 1px solid var(--border);
        }

        canvas#view {
            width: 100%;
            max-width: 560px;
            display: block;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #000;
        }

        .controls {
            display: grid;
            gap: 0.85rem;
        }

        .control-card {
            background: var(--panel-muted);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 0.9rem;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.6rem 0.75rem;
        }

        label {
            user-select: none;
            display: block;
            color: var(--muted);
            font-size: 14px;
        }

        .inline {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        select,
        input,
        button,
        textarea {
            font: inherit;
            color: var(--text);
        }

        select,
        input[type='text'],
        input[type='number'],
        textarea {
            width: 100%;
            padding: 0.45rem 0.55rem;
            background: #0b1322;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }

        input[type='checkbox'] {
            accent-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        button {
            appearance: none;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(125, 211, 252, 0.18), rgba(56, 189, 248, 0.14));
            color: var(--text);
            padding: 0.55rem 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
            box-shadow: 0 6px 16px rgba(56, 189, 248, 0.18);
        }

        .muted-text {
            color: var(--muted);
            margin: 0.1rem 0 0;
            font-size: 13px;
        }

        .stat-boxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.55rem;
            margin-top: 0.35rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.6rem;
        }

        .stat label {
            font-size: 12px;
            letter-spacing: 0.02em;
            margin-bottom: 0.2rem;
        }

        .stat input {
            font-family: 'SFMono-Regular', 'Menlo', 'Consolas', monospace;
            text-align: center;
        }

        /* 兩張縮圖 */
        .thumb-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .thumb-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .thumb {
            width: 180px;
            height: 180px;
            background: #0b1322;
            border: 1px solid var(--border);
            border-radius: 6px;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <div class="headline">
                <div class="pill">建立新的投影</div>
                <h1>GLSL Projectron</h1>
                <p class="panel-subtitle">
                    透過演化多邊形雲，使其同時逼近兩個視角的目標影像（正面與右側）。調整參數、觀察迭代過程，並可匯出最終的幾何資料。
                </p>
            </div>

            <div class="button-row">
                <input type="checkbox" id="paused" checked style="display: none;" />
                <button id="pauseBtn" type="button">暫停</button>

                <!-- 主視圖 -->
                <button id="uploadTrigger" type="button">主視圖圖片</button>
                <input id="imageInput" type="file" accept="image/*" hidden />

                <!-- 側視圖 -->
                <button id="uploadTrigger2" type="button">側視圖圖片</button>
                <input id="imageInput2" type="file" accept="image/*" hidden />

                <button id="resetBtn" type="button">清除</button>
            </div>
        </header>

        <div class="layout">
            <div class="panel">
                <div class="panel-header">
                    <span>視窗區</span>
                    <span class="panel-subtitle">拖曳以旋轉視角</span>
                </div>
                <div class="canvas-frame">
                    <canvas id='view' width="500" height="500"></canvas>
                </div>
            </div>

            <div class="controls">

                <div class="control-card">
                    <div class="panel-header">
                        <span>進度</span>
                        <span class="panel-subtitle">自動更新</span>
                    </div>

                    <div class="stat-boxes">
                        <div class="stat">
                            <label>多邊形數</label>
                            <input id='polys' type='text' readonly>
                        </div>

                        <div class="stat">
                            <label>迭代數</label>
                            <input id='gens' type='text' readonly>
                        </div>

                        <div class="stat">
                            <label>代 / 秒</label>
                            <input id='gps' type='text' readonly>
                        </div>

                        <div class="stat">
                            <label>總分（幾何平均）</label>
                            <input id='score' type='text' readonly>
                        </div>
                    </div>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>演化參數</span>
                        <span class="panel-subtitle">調整演算法行為</span>
                    </div>

                    <div class="control-grid">

                        <label>每幀演化次數
                            <select id='gensPerFrame'>
                                <option>1</option>
                                <option>10</option>
                                <option selected='true'>20</option>
                                <option>50</option>
                                <option>100</option>
                            </select>
                        </label>

                        <label>較少多邊形容忍度
                            <input type='text' id='preferFewer' value='0.001'>
                            <div class="muted-text">分數在此範圍內時允許捨棄多邊形</div>
                        </label>

                        <label>Alpha 範圍
                            <div class="inline" style="width: 100%;">
                                <input style="max-width: 80px;" type='text' id='minAlpha' value='0.1'>
                                <span class="panel-subtitle">到</span>
                                <input style="max-width: 80px;" type='text' id='maxAlpha' value='0.5'>
                            </div>
                        </label>

                        <label>調整幅度
                            <input type='text' id='adjust' value='0.5'>
                        </label>

                    </div>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>資料匯入 / 匯出</span>
                        <span class="panel-subtitle">頂點與顏色資料</span>
                    </div>

                    <div class="button-row">
                        <button id='export'>匯出資料 ↓</button>
                        <button id='exportPly'>下載 PLY</button>
                        <button id='import'>匯入資料 ↑</button>
                        <button id='importPly'>導入 PLY</button>
                    </div>

                    <input id='plyInput' type='file' accept='.ply,model/ply,text/plain' hidden />
                    <textarea id='data' rows='3' cols='30'></textarea>
                    <p class="muted-text">按下「導入 PLY」可讀取 ASCII PLY；按下「下載 PLY」會匯出目前三角形網格與每個頂點的 RGBA 顏色。</p>
                </div>

                <div class="control-card">
                    <div class="panel-header">
                        <span>顯示設定</span>
                        <span class="panel-subtitle">顯示參考層或中間結果</span>
                    </div>

                    <div class="button-row">
                        <label class="inline">
                            <input type='checkbox' id='showRef' /> 顯示主視圖參考
                        </label>

                        <label class="inline">
                            <input type='checkbox' id='showScr' /> 顯示主視圖暫存
                        </label>
                    </div>

                    <!-- 兩張原圖縮圖 -->
                    <div class="thumb-row">
                        <div class="thumb-box">
                            <div class="panel-subtitle">主視圖</div>
                            <img id="thumbMain" class="thumb">
                        </div>
                        <div class="thumb-box">
                            <div class="panel-subtitle">側視圖（+90°）</div>
                            <img id="thumbSide" class="thumb">
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <script src="maker-bundle.js"></script>

        <script>
            (function () {
                var checkbox = document.getElementById('paused');
                var btn = document.getElementById('pauseBtn');
                if (!checkbox || !btn) return;

                function syncLabel() {
                    btn.textContent = checkbox.checked ? '運行' : '暫停';
                }

                btn.addEventListener('click', function () {
                    checkbox.checked = !checkbox.checked;
                    var ev = new Event('change', { bubbles: true });
                    checkbox.dispatchEvent(ev);
                    syncLabel();
                });

                syncLabel();
            })();
        </script>

        <script>
            (function () {
                var importBtn = document.getElementById('importPly');
                var plyInput = document.getElementById('plyInput');
                var dataBox = document.getElementById('data');
                if (!importBtn || !plyInput) return;

                var integerTypes = {
                    char: true, uchar: true, short: true, ushort: true,
                    int: true, uint: true, int8: true, uint8: true,
                    int16: true, uint16: true, int32: true, uint32: true
                };

                function clamp01(n) {
                    return Math.max(0, Math.min(1, n));
                }

                function normalizeColor(value, type, fallback) {
                    if (value === undefined || value === null || Number.isNaN(value)) return fallback;
                    if (integerTypes[type]) return clamp01(value / 255);
                    if (value > 1 || value < 0) return clamp01(value / 255);
                    return clamp01(value);
                }

                function pickDefined() {
                    for (var i = 0; i < arguments.length; i++) {
                        if (arguments[i] !== undefined) return arguments[i];
                    }
                }

                function parseRow(tokens, props) {
                    var cursor = 0;
                    var row = {};
                    props.forEach(function (prop) {
                        if (prop.kind === 'list') {
                            var count = parseInt(tokens[cursor++], 10);
                            var list = [];
                            for (var i = 0; i < count; i++) {
                                list.push(parseFloat(tokens[cursor++]));
                            }
                            row[prop.name] = list;
                        } else {
                            row[prop.name] = parseFloat(tokens[cursor++]);
                        }
                    });
                    return row;
                }

                function getScalarType(element, name) {
                    if (!element) return null;
                    for (var i = 0; i < element.properties.length; i++) {
                        var prop = element.properties[i];
                        if (prop.kind === 'scalar' && prop.name === name) return prop.type;
                    }
                    return null;
                }

                function toProjectronDataFromPLY(text) {
                    var lines = String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
                    if (!lines.length || lines[0].trim() !== 'ply') return null;

                    var format = null;
                    var headerEnd = -1;
                    var currentElement = null;
                    var elements = {};

                    for (var i = 1; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (!line || line.indexOf('comment ') === 0 || line.indexOf('obj_info ') === 0) continue;
                        if (line === 'end_header') {
                            headerEnd = i;
                            break;
                        }
                        var parts = line.split(/\s+/);
                        if (parts[0] === 'format') {
                            format = parts[1];
                        } else if (parts[0] === 'element') {
                            currentElement = {
                                name: parts[1],
                                count: parseInt(parts[2], 10),
                                properties: []
                            };
                            elements[currentElement.name] = currentElement;
                        } else if (parts[0] === 'property' && currentElement) {
                            if (parts[1] === 'list') {
                                currentElement.properties.push({
                                    kind: 'list',
                                    name: parts[4]
                                });
                            } else {
                                currentElement.properties.push({
                                    kind: 'scalar',
                                    type: parts[1],
                                    name: parts[2]
                                });
                            }
                        }
                    }

                    if (format !== 'ascii' || headerEnd < 0 || !elements.vertex || !elements.vertex.count) {
                        return null;
                    }

                    var state = { index: headerEnd + 1 };
                    function nextTokens() {
                        while (state.index < lines.length) {
                            var raw = lines[state.index++].trim();
                            if (!raw || raw.indexOf('comment ') === 0 || raw.indexOf('obj_info ') === 0) continue;
                            return raw.split(/\s+/);
                        }
                        return null;
                    }

                    var vertexElement = elements.vertex;
                    var vertexTypes = {
                        red: getScalarType(vertexElement, 'red') || getScalarType(vertexElement, 'r'),
                        green: getScalarType(vertexElement, 'green') || getScalarType(vertexElement, 'g'),
                        blue: getScalarType(vertexElement, 'blue') || getScalarType(vertexElement, 'b'),
                        alpha: getScalarType(vertexElement, 'alpha') || getScalarType(vertexElement, 'opacity') || getScalarType(vertexElement, 'a')
                    };

                    var vertices = [];
                    for (i = 0; i < vertexElement.count; i++) {
                        var vertexTokens = nextTokens();
                        if (!vertexTokens) return null;
                        var vertexRow = parseRow(vertexTokens, vertexElement.properties);
                        if (Number.isNaN(vertexRow.x) || Number.isNaN(vertexRow.y) || Number.isNaN(vertexRow.z)) return null;

                        var vertexRedRaw = pickDefined(vertexRow.red, vertexRow.r);
                        var vertexGreenRaw = pickDefined(vertexRow.green, vertexRow.g);
                        var vertexBlueRaw = pickDefined(vertexRow.blue, vertexRow.b);
                        var vertexAlphaRaw = pickDefined(vertexRow.alpha, vertexRow.opacity, vertexRow.a);

                        vertices.push({
                            x: vertexRow.x,
                            y: vertexRow.y,
                            z: vertexRow.z,
                            r: normalizeColor(vertexRedRaw, vertexTypes.red, 1),
                            g: normalizeColor(vertexGreenRaw, vertexTypes.green, 1),
                            b: normalizeColor(vertexBlueRaw, vertexTypes.blue, 1),
                            a: normalizeColor(vertexAlphaRaw, vertexTypes.alpha, 1),
                            hasR: vertexRedRaw !== undefined,
                            hasG: vertexGreenRaw !== undefined,
                            hasB: vertexBlueRaw !== undefined,
                            hasA: vertexAlphaRaw !== undefined
                        });
                    }

                    var faceElement = elements.face;
                    var faceTypes = {
                        red: getScalarType(faceElement, 'red') || getScalarType(faceElement, 'r'),
                        green: getScalarType(faceElement, 'green') || getScalarType(faceElement, 'g'),
                        blue: getScalarType(faceElement, 'blue') || getScalarType(faceElement, 'b'),
                        alpha: getScalarType(faceElement, 'alpha') || getScalarType(faceElement, 'opacity') || getScalarType(faceElement, 'a')
                    };

                    var faces = [];
                    if (faceElement && faceElement.count) {
                        for (i = 0; i < faceElement.count; i++) {
                            var faceTokens = nextTokens();
                            if (!faceTokens) return null;
                            var faceRow = parseRow(faceTokens, faceElement.properties);
                            var indices = faceRow.vertex_indices || faceRow.vertex_index;
                            if (!indices || indices.length < 3) continue;

                            var faceRedRaw = pickDefined(faceRow.red, faceRow.r);
                            var faceGreenRaw = pickDefined(faceRow.green, faceRow.g);
                            var faceBlueRaw = pickDefined(faceRow.blue, faceRow.b);
                            var faceAlphaRaw = pickDefined(faceRow.alpha, faceRow.opacity, faceRow.a);

                            faces.push({
                                indices: indices,
                                r: normalizeColor(faceRedRaw, faceTypes.red, null),
                                g: normalizeColor(faceGreenRaw, faceTypes.green, null),
                                b: normalizeColor(faceBlueRaw, faceTypes.blue, null),
                                a: normalizeColor(faceAlphaRaw, faceTypes.alpha, null),
                                hasR: faceRedRaw !== undefined,
                                hasG: faceGreenRaw !== undefined,
                                hasB: faceBlueRaw !== undefined,
                                hasA: faceAlphaRaw !== undefined
                            });
                        }
                    } else {
                        for (i = 0; i + 2 < vertices.length; i += 3) {
                            faces.push({
                                indices: [i, i + 1, i + 2],
                                hasR: false,
                                hasG: false,
                                hasB: false,
                                hasA: false
                            });
                        }
                    }

                    if (!faces.length) return null;

                    var vertArr = [];
                    var colArr = [];

                    function appendTri(aIndex, bIndex, cIndex, face) {
                        [aIndex, bIndex, cIndex].forEach(function (vIndex) {
                            var vertex = vertices[vIndex];
                            if (!vertex) throw new Error('Missing vertex index ' + vIndex);
                            vertArr.push(vertex.x, vertex.y, vertex.z);
                            colArr.push(
                                vertex.hasR ? vertex.r : face.hasR ? face.r : 1,
                                vertex.hasG ? vertex.g : face.hasG ? face.g : 1,
                                vertex.hasB ? vertex.b : face.hasB ? face.b : 1,
                                vertex.hasA ? vertex.a : face.hasA ? face.a : 1
                            );
                        });
                    }

                    try {
                        faces.forEach(function (face) {
                            for (var i = 1; i + 1 < face.indices.length; i++) {
                                appendTri(face.indices[0], face.indices[i], face.indices[i + 1], face);
                            }
                        });
                    } catch (err) {
                        console.warn('PLY import failed:', err.message);
                        return null;
                    }

                    if (!vertArr.length || vertArr.length / 3 !== colArr.length / 4) return null;

                    return 'vert-xyz,' +
                        vertArr.map(function (n) { return n.toFixed(8); }).join(',') +
                        ',\ncol-rgba,' +
                        colArr.map(function (n) { return n.toFixed(5); }).join(',');
                }

                importBtn.addEventListener('click', function () {
                    plyInput.value = '';
                    plyInput.click();
                });

                plyInput.addEventListener('change', function (ev) {
                    var file = ev.target.files && ev.target.files[0];
                    if (!file) return;

                    var reader = new FileReader();
                    reader.onloadend = function (loadEvent) {
                        var text = loadEvent.target.result || '';
                        var imported = false;

                        if (window.p && typeof window.p.importPLY === 'function') {
                            imported = !!window.p.importPLY(text);
                        } else if (window.p && typeof window.p.importData === 'function') {
                            var data = toProjectronDataFromPLY(text);
                            if (data) imported = !!window.p.importData(data);
                        }

                        if (imported && dataBox) {
                            dataBox.value = '';
                        } else if (!imported) {
                            console.warn('PLY import failed: unsupported file or invalid data');
                        }
                    };
                    reader.readAsText(file);
                });
            })();
        </script>

    </body>

</html>
